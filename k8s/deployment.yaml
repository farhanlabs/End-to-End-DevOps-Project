apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-portfolio-deployment
  labels:
    app: my-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-portfolio
  template:
    metadata:
      labels:
        app: my-portfolio
  spec:
    containers:
    - name: react-app
      image: farhan091/my-portfolio:latest 
      ports:
      - containerPort: 80
      imagePullPolicy: Always