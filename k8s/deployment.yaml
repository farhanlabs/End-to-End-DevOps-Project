apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-portfolio-deployment
  labels:
    app: my-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-portfolio
  template:
    metadata:
      labels:
        app: my-portfolio
    spec: #  Sahi hai! Ab isme 4 spaces hain, ye 'template' ke andar aa gaya hai
      containers:
      - name: react-app
        image: farhan091/my-portfolio:d8fb4851d3c23fc91e6742357f1cbbacadccc56b
        ports:
        - containerPort: 80
        imagePullPolicy: Always