name: Vite React Auto GitOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 🌟 GADBAD FIX: GitHub Actions ko repo me push karne ki explicit permission do
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: farhan091/my-portfolio:${{ github.sha }}

    - name: Update Kubernetes Manifest
      run: |
        sed -i "s|image: farhan091/my-portfolio:.*|image: farhan091/my-portfolio:${{ github.sha }}|g" k8s/deployment.yaml
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/deployment.yaml
        git commit -m "chore: Update image tag to ${{ github.sha }} [skip ci]"
        git push