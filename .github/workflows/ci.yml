name: Vite React Multi-Repo GitOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 1. Image build hokar unique Commit SHA tag ke sath Docker Hub chali jayegi
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: farhan091/my-portfolio:${{ github.sha }}

    # 2. Doosri Manifest repo ko clone karo, wahan tag update karo aur push karo
    - name: Update Manifest in GitOps Repo
      run: |
        # Manifest repository ko clone karo (Aapke GITOPS_TOKEN secret ka use karke)
        git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/farhanlabs/portfolio-gitops-manifests.git gitops-repo
        cd gitops-repo
        
        # deployment.yaml ke andar purane image tag ko naye Commit SHA se replace karo
        sed -i "s|image: farhan091/my-portfolio:.*|image: farhan091/my-portfolio:${{ github.sha }}|g" k8s/deployment.yaml
        
        # GitHub Actions Bot ke naam se changes ko commit aur push karo
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/deployment.yaml
        git commit -m "chore: Automatically update image tag to ${{ github.sha }}"
        git push origin main