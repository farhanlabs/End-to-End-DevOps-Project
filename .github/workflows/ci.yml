name: Vite React Multi-Repo GitOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 1. Image build hokar Docker Hub chali gayi
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: farhan091/my-portfolio:${{ github.sha }}

    # 2. Doosri Manifest repo ko checkout karo aur wahan tag update karke push karo
    - name: Update Manifest in GitOps Repo
      run: |
        # Nayi manifest repo ko clone karo (Apna username aur repo name sahi kar lena)
        git clone https://${{ secrets.GitOps-Token }}@github.com/farhanlabs/portfolio-gitops-manifests.git gitops-repo
        cd gitops-repo
        
        # Tag update karo
        sed -i "s|image: farhan091/my-portfolio:.*|image: farhan091/my-portfolio:${{ github.sha }}|g" k8s/deployment.yaml
        
        # Commit aur Push karo doosri repo me
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/deployment.yaml
        git commit -m "chore: Update image tag to ${{ github.sha }}"
        git push origin main