name: Vite React CI Pipeline

on:
  push:
    branches:
      - main  # Agar aapki main branch ka naam 'master' hai, toh yahan master likhna

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Ab ye bina kisi jhanjhat ke automatic tumhara username aur project naam set kar dega
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-portfolio:latest